spring:
  datasource:
    url: jdbc:h2:mem:kanbandb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

gemini:
  api-key: ${GEMINI_API_KEY}

cors:
  allowed-origins: http://localhost:4200

server:
  port: 8080
